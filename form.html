<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="form.css" rel="stylesheet">
    <title>Form</title>
  </head>
  <body>
    <h1>COLLEGE PREDICTOR</h1>
    <p>Please fill out this form to find out the best college for you.</p>
    <form>
      <fieldset>
        <label for="rank">Enter Your JEE Rank: <input id="rank" name="rank" type="number" required /></label><br>
        <label for="marks">Enter Your Marks (Optional): <input id="marks" name="marks" type="number"/></label>  <br>
        <label for="gender">Select Your Gender: <br>
            <input type="radio" id="gender" name="gender" value="male" class="inline"/> Male    <br> 
            <input type="radio" id="gender" name="gender" value="female" class="inline"/> Female  </label>
      </fieldset>
      <fieldset>
        <label for="Category">Select your Category:
            <select id="category" name="category" required>
              <option value="">(select one)</option>
              <option value="1">GEN</option>
              <option value="2">OBC-NCL</option>
              <option value="3">SC</option>
              <option value="4">ST</option>
              <option value="5">GEN-PWD</option>
              <option value="6">OBC-NCL-PWD</option>
              <option value="7">SC-PWD</option>
              <option value="8">ST-PWD</option>
              <option value="9">GEN-EWS</option>
              <option value="10">GEN-EWS-PWD</option>
            </select>
          </label>     
          <br>
          <label for="state">Select your Domicile State:
          <select id="country-state" name="country-state" required>
            <option value="">(select one)</option>
            <option value="AN">Andaman and Nicobar Islands</option>
            <option value="AP">Andhra Pradesh</option>
            <option value="AR">Arunachal Pradesh</option>
            <option value="AS">Assam</option>
            <option value="BR">Bihar</option>
            <option value="CH">Chandigarh</option>
            <option value="CT">Chhattisgarh</option>
            <option value="DN">Dadra and Nagar Haveli</option>
            <option value="DD">Daman and Diu</option>
            <option value="DL">Delhi</option>
            <option value="GA">Goa</option>
            <option value="GJ">Gujarat</option>
            <option value="HR">Haryana</option>
            <option value="HP">Himachal Pradesh</option>
            <option value="JK">Jammu and Kashmir</option>
            <option value="JH">Jharkhand</option>
            <option value="KA">Karnataka</option>
            <option value="KL">Kerala</option>
            <option value="LA">Ladakh</option>
            <option value="LD">Lakshadweep</option>
            <option value="MP">Madhya Pradesh</option>
            <option value="MH">Maharashtra</option>
            <option value="MN">Manipur</option>
            <option value="ML">Meghalaya</option>
            <option value="MZ">Mizoram</option>
            <option value="NL">Nagaland</option>
            <option value="OR">Odisha</option>
            <option value="PY">Puducherry</option>
            <option value="PB">Punjab</option>
            <option value="RJ">Rajasthan</option>
            <option value="SK">Sikkim</option>
            <option value="TN">Tamil Nadu</option>
            <option value="TG">Telangana</option>
            <option value="TR">Tripura</option>
            <option value="UP">Uttar Pradesh</option>
            <option value="UT">Uttarakhand</option>
            <option value="WB">West Bengal</option>
        </select>   
      </fieldset>
      <fieldset>
        <label for="branch">Preferred Branch (Optional)
          <select id="branch" name="branch">
            <option value="">(select one)</option>
          </select>
        </label>
        <br>
        <label for="college">Preferred College (Optional)
            <select id="college" name="college">
              <option value="">(select one)</option>
            </select>
          </label>
      </fieldset>
      <input type="submit" value="Submit" />
    </form>
  </body>
</html>
